<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simrik Jutta Udhyog - Premium Leather Shoes Nepal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #4da6ff;
    --secondary: #80c1ff;
    --dark: #1a1a1a;
    --light: #f8f9fa;
    --white: #ffffff;
    --shadow: 0 10px 30px rgba(0,0,0,0.1);
    --success: #28a745;
}

* {margin:0;padding:0;box-sizing:border-box;}
body {font-family:'Inter',sans-serif;background:var(--light);color:var(--dark);}

/* HEADER */
.header {position:fixed;width:100%;background:white;box-shadow:var(--shadow);z-index:1000;top:0;}
.nav {display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;max-width:1200px;margin:auto;}
.logo {font-size:1.6rem;font-weight:700;color:var(--primary);text-decoration:none;}
.nav-links {display:flex;list-style:none;gap:2rem;}
.nav-links a {text-decoration:none;color:var(--dark);font-weight:500;}
.cart-btn {background:var(--primary);color:white;padding:0.7rem 1.5rem;border-radius:25px;border:none;cursor:pointer;}

/* HERO */
.hero {height:100vh;display:flex;justify-content:center;align-items:center;text-align:center;background:linear-gradient(135deg,rgba(0,0,0,0.6),rgba(77,166,255,0.25)),url('https://images.unsplash.com/photo-1600185365483-26d7a4cc7519') center/cover no-repeat;color:white;}
.hero h1 {font-size:3rem;margin-bottom:1rem;}
.btn {padding:12px 25px;background:white;color:var(--primary);border-radius:25px;text-decoration:none;font-weight:600;}

/* PRODUCTS */
.products {padding:6rem 2rem 4rem;max-width:1200px;margin:auto;}
.products-grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:2rem;}
.product-card {background:white;padding:1rem;border-radius:15px;box-shadow:var(--shadow);}
.product-image img {width:100%;height:200px;object-fit:cover;border-radius:10px;}
.product-price {color:var(--primary);font-weight:700;}
.add-to-cart {background:var(--primary);color:white;border:none;padding:0.5rem 1rem;border-radius:20px;width:100%;margin-top:10px;cursor:pointer;}

/* CONTACT */
.contact {text-align:center;padding:4rem 2rem;}
.contact button {margin-top:1rem;}

/* FOOTER */
.footer {background:#1a1a1a;color:white;text-align:center;padding:2rem;}
</style>
</head>

<body>

<header class="header">
<nav class="nav">
<a href="#" class="logo">Simrik Jutta</a>
<ul class="nav-links">
<li><a href="#home">Home</a></li>
<li><a href="#products">Shop</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
<button class="cart-btn">Cart (<span id="cart-count">0</span>)</button>
</nav>
</header>

<section id="home" class="hero">
<div>
<h1>Simrik Jutta Udhyog</h1>
<p>Premium Leather Shoes from Nepal</p>
<a href="#products" class="btn">Shop Now</a>
</div>
</section>

<section id="products" class="products">
<h2>Products</h2>

<div class="products-grid">

<div class="product-card">
<div class="product-image">
<img src="https://images.unsplash.com/photo-1549298916-b41d501d3772">
</div>
<h3>Oxford Shoe</h3>
<p class="product-price">$120</p>
<button class="add-to-cart" onclick="addToCart()">Add to Cart</button>
</div>

<div class="product-card">
<div class="product-image">
<img src="https://images.unsplash.com/photo-1528701800489-20be3c52c06b">
</div>
<h3>Derby Shoe</h3>
<p class="product-price">$140</p>
<button class="add-to-cart" onclick="addToCart()">Add to Cart</button>
</div>

</div>
</section>

<!-- CONTACT SECTION -->
<section id="contact" class="contact">
<h2>Contact Us</h2>
<p>📞 Phone: <strong id="phone">Click to reveal</strong></p>
<button class="btn" onclick="showPhone()">Show Phone Number</button>

<br><br>

<!-- Direct Call Button -->
<a href="tel:+97798XXXXXXXXXX" herf="tel:+9779827068007" class="btn">Call Now</a>
</section>

<footer class="footer">
<p>© 2024 Simrik Jutta Udhyog | Nepal</p>
<p>Production Of Nepla Hand-made and hand stiched</p>
</footer>

<script>
let count = 0;

function addToCart(){
    count++;
    document.getElementById('cart-count').textContent = count;
}

function showPhone(){
    document.getElementById('phone').textContent = '+977-98XXXXXXXXXX';
}
</script>

</body>
</html>
