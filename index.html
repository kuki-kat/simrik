<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simrik Jutta Udhyog - Leather Collection</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #4da6ff;
    --secondary: #80c1ff;
    --dark: #1a1a1a;
    --light: #f0f8ff;
    --white: #ffffff;
    --shadow: 0 10px 30px rgba(0,0,0,0.1);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:var(--light);
    color:var(--dark);
}

/* HEADER */
.header{
    position:fixed;
    width:100%;
    background:white;
    box-shadow:var(--shadow);
    z-index:1000;
}

.nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:1rem 2rem;
}

.logo{
    font-size:1.6rem;
    font-weight:700;
    color:var(--primary);
    text-decoration:none;
}

.nav-links{
    display:flex;
    list-style:none;
    gap:2rem;
}

.nav-links a{
    text-decoration:none;
    color:var(--dark);
}

.cart{
    background:var(--primary);
    color:white;
    padding:0.6rem 1.2rem;
    border-radius:20px;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:
        linear-gradient(rgba(0,0,0,0.5), rgba(77,166,255,0.6)),
        url('https://images.unsplash.com/photo-1600185365483-26d7a4cc7519') center/cover no-repeat;
    color:white;
}

.hero h1{
    font-size:3rem;
}

.hero p{
    margin-top:10px;
    font-size:1.2rem;
}

.btn{
    margin-top:20px;
    display:inline-block;
    padding:12px 25px;
    background:white;
    color:var(--primary);
    border-radius:30px;
    text-decoration:none;
    font-weight:600;
}

/* PRODUCTS */
.products{
    padding:5rem 2rem;
    max-width:1200px;
    margin:auto;
}

.products h2{
    text-align:center;
    margin-bottom:2rem;
}

.products-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:2rem;
}

.product-card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:var(--shadow);
    transition:0.3s;
}

.product-card:hover{
    transform:translateY(-8px);
}

.product-image{
    height:220px;
}

.product-image img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.product-info{
    padding:1rem;
}

.product-name{
    font-weight:600;
}

.product-price{
    color:var(--primary);
    font-weight:700;
    margin-top:5px;
}

/* FOOTER */
.footer{
    background:#111;
    color:white;
    text-align:center;
    padding:2rem;
    margin-top:3rem;
}
</style>
</head>

<body>

<header class="header">
<nav class="nav">
<a href="#" class="logo">Simrik Jutta Udhyog</a>
<ul class="nav-links">
<li><a href="#">Home</a></li>
<li><a href="#products">Shop</a></li>
</ul>
<div class="cart">Cart</div>
</nav>
</header>

<section class="hero">
<div>
<h1>Simrik Jutta Udhyog</h1>
<p>Premium Handmade Leather Shoes from Nepal</p>
<a href="#products" class="btn">Shop Now</a>
</div>
</section>

<section id="products" class="products">
<h2>Leather Collection</h2>

<div class="products-grid">

<div class="product-card">
<div class="product-image">
<img src="https://images.unsplash.com/photo-1549298916-b41d501d3772">
</div>
<div class="product-info">
<div class="product-name">Classic Leather Oxford</div>
<div class="product-price">$120</div>
</div>
</div>

<div class="product-card">
<div class="product-image">
<img src="https://images.unsplash.com/photo-1528701800489-20be3c52c06b">
</div>
<div class="product-info">
<div class="product-name">Brown Derby Shoe</div>
<div class="product-price">$140</div>
</div>
</div>

<div class="product-card">
<div class="product-image">
<img src="https://images.unsplash.com/photo-1608231387042-66d1773070a5">
</div>
<div class="product-info">
<div class="product-name">Leather Loafers</div>
<div class="product-price">$95</div>
</div>
</div>

<div class="product-card">
<div class="product-image">
<img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
</div>
<div class="product-info">
<div class="product-name">Formal Black Shoe</div>
<div class="product-price">$130</div>
</div>
</div>

</div>
</section>

<footer class="footer">
<p>© 2026 Simrik Jutta Udhyog | All Rights Reserved</p>
</footer>

</body>
</html>
